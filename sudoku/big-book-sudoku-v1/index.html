<html lang="en">
<head>

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#f9f9f9;color:#333;line-height:1.5}
header{background:#fff;border-bottom:1px solid #e0e0e0;padding:24px 16px;text-align:center}
header h1{font-size:1.4rem;margin-bottom:4px}
header p{font-size:.85rem;color:#888}
.search-bar{position:sticky;top:0;z-index:100;background:#fff;border-bottom:1px solid #ddd;
  padding:12px 16px;display:flex;flex-wrap:wrap;align-items:center;gap:10px;justify-content:center}
.search-bar input{width:80px;padding:6px 8px;border:1px solid #ccc;border-radius:4px;font-size:.9rem;text-align:center}
.search-bar button{padding:6px 14px;border:none;background:#4a90d9;color:#fff;border-radius:4px;cursor:pointer;font-size:.85rem}
.search-bar button:hover{background:#357abd}
.browse-toggle{color:#4a90d9;cursor:pointer;font-size:.85rem;text-decoration:underline}
.browse-grid{display:none;flex-wrap:wrap;gap:3px;max-width:700px;margin:8px auto 0}
.browse-grid.open{display:flex}
.browse-grid a{display:inline-block;width:34px;height:24px;line-height:24px;text-align:center;
  font-size:10px;border:1px solid #ddd;border-radius:3px;color:#333;text-decoration:none;background:#f5f5f5}
.browse-grid a:hover{background:#4a90d9;color:#fff}
.content{max-width:900px;margin:20px auto;padding:0 12px}
.page-card{background:#fff;border:1px solid #e0e0e0;border-radius:8px;margin-bottom:20px;padding:16px}
.page-card h2{font-size:1rem;color:#555;margin-bottom:12px;border-bottom:1px solid #eee;padding-bottom:6px}
.grid-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:12px}
.puzzle-solution{text-align:center}
.puzzle-solution h3{font-size:.85rem;margin-bottom:4px}
.puzzle-solution .badge{display:inline-block;font-size:.7rem;padding:1px 8px;border-radius:10px;
  color:#fff;margin-bottom:6px}
.badge-Easy{background:#4caf50}.badge-Medium{background:#2196f3}
.badge-Hard{background:#ff9800}.badge-Expert{background:#e53935}
table.sg{border-collapse:collapse;margin:0 auto;border:2px solid #222}
table.sg td{width:28px;height:28px;text-align:center;vertical-align:middle;font-size:13px;
  border:1px solid #ccc}
table.sg td:nth-child(3n){border-right:2px solid #444}
table.sg tr:nth-child(3n) td{border-bottom:2px solid #444}
table.sg td.gv{font-weight:bold;color:#222}
table.sg td.sv{color:#5b8cbf}
.back-top{position:fixed;bottom:20px;right:20px;background:#4a90d9;color:#fff;border:none;
  border-radius:50%;width:40px;height:40px;font-size:18px;cursor:pointer;display:none;
  box-shadow:0 2px 6px rgba(0,0,0,.3)}
footer{text-align:center;padding:20px;font-size:.75rem;color:#aaa}
@media(max-width:600px){
  .grid-row{grid-template-columns:1fr}
  table.sg td{width:24px;height:24px;font-size:11px}
}
</style>

const PAGES={};
P.forEach(p=>{const pg=p.pg;if(!PAGES[pg])PAGES[pg]=[];PAGES[pg].push(p)});

function renderGrid(p){
  let h='<table class="sg">';
  for(let r=0;r<9;r++){
    h+='<tr>';
    for(let cc=0;cc<9;cc++){
      const isGiven=p.puzzle[r][cc]!==0;
      h+='<td class="'+(isGiven?'gv':'sv')+'">'+p.solution[r][cc]+'</td>';
    }
    h+='</tr>';
  }
  return h+'</table>';
}

function buildPage(pgNum, puzzles){
  const card=document.createElement('div');
  card.className='page-card';
  card.id='page-'+pgNum;
  let h='<h2>Page '+pgNum+'</h2>';
  for(let row=0;row<2;row++){
    h+='<div class="grid-row">';
    for(let col=0;col<2;col++){
      const idx=row*2+col;
      if(idx<puzzles.length){
        const p=puzzles[idx];
        h+='<div class="puzzle-solution">';
        h+='<h3>Puzzle '+p.n+'</h3>';
        h+='<span class="badge badge-'+p.d+'">'+p.d+'</span>';
        h+=renderGrid(p);
        h+='</div>';
      }
    }
    h+='</div>';
  }
  card.innerHTML=h;
  return card;
}

const content=document.getElementById('content');
const pgNums=Object.keys(PAGES).map(Number).sort((a,b)=>a-b);
pgNums.forEach(pg=>content.appendChild(buildPage(pg,PAGES[pg])));

// Browse grid
const bg=document.getElementById('browseGrid');
P.forEach(p=>{
  const a=document.createElement('a');
  a.href='#';
  a.textContent=p.n;
  a.onclick=function(e){e.preventDefault();jumpTo(p.n)};
  bg.appendChild(a);
});

function toggleBrowse(){bg.classList.toggle('open')}

function jumpTo(num){
  bg.classList.remove('open');
  const n=num||parseInt(document.getElementById('jumpInput').value);
  if(!n||n<1||n>400)return;
  const p=P.find(x=>x.n===n);
  if(!p)return;
  const el=document.getElementById('page-'+p.pg);
  if(el){
    const bar=document.querySelector('.search-bar');
    const offset=bar?bar.offsetHeight+10:60;
    const top=el.getBoundingClientRect().top+window.pageYOffset-offset;
    window.scrollTo({top,behavior:'smooth'});
  }
}

document.getElementById('jumpInput').addEventListener('keydown',function(e){
  if(e.key==='Enter')jumpTo();
});

window.addEventListener('scroll',function(){
  document.getElementById('backTop').style.display=window.scrollY>400?'block':'none';
});
</script>
